<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LETFLIX | Catálogo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/catalogo.css">
</head>
<body class="catalog-page">
    <header class="site-header">
        <div class="site-header__inner">
            <div class="header-left">
                <a class="brand" href="catalogo.html" aria-label="Ir para a tela inicial">LETFLIX</a>
            </div>

            <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
                Menu
            </button>

            <nav id="site-nav" class="site-nav" aria-label="Navegação principal">
                <a href="catalogo.html">Início</a>
                <a href="#filmes">Filmes</a>
                <a href="#series">Séries</a>
                <a href="#minha-lista">Minha Lista</a>
            </nav>

            <div class="header-right">
                <div class="header-search">
                    <button class="header-search__icon" id="buscar-acao" type="button" aria-label="Buscar">⌕</button>
                    <input id="busca-tmdb" type="search" placeholder="Títulos e gêneros" aria-label="Buscar títulos e gêneros">
                </div>

                <div class="perfil-header" id="perfil-header">
                    <button class="perfil-trigger" id="perfil-trigger" type="button" aria-label="Abrir menu do perfil" aria-expanded="false" aria-controls="perfil-dropdown">
                        <img id="img-perfil" src="assets/capa1.avif" alt="Perfil">
                        <span class="perfil-seta" aria-hidden="true">▼</span>
                    </button>

                    <div class="perfil-dropdown" id="perfil-dropdown" role="menu" aria-hidden="true">
                        <p class="perfil-atual" id="perfil-atual">Perfil atual</p>
                        <a href="perfis.html" class="perfil-item" id="trocar-perfil" role="menuitem">Trocar perfil</a>
                        <button type="button" class="perfil-item" id="editar-perfil" role="menuitem">Editar perfil</button>
                        <button type="button" class="perfil-item" id="sair" role="menuitem">Sair</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section id="inicio" class="hero" aria-label="Destaque principal">
            <div class="hero__overlay"></div>
            <div class="hero__content">
                <p class="hero__eyebrow">Original LETFLIX • <span id="hero-profile">Leticinha</span></p>
                <div class="hero__actions">
                    <button class="primary-button" id="assistir-agora" type="button">Assistir agora</button>
                    <button class="secondary-button" id="mais-informacoes" type="button" aria-controls="info-filme" aria-expanded="false">Mais informações</button>
                </div>
                <section id="info-filme" class="info-panel" aria-label="Informações do título" aria-live="polite" aria-hidden="true"></section>
            </div>
        </section>

        <section id="sec-filmes" class="catalog-section" aria-labelledby="movies-title">
            <div class="section-heading">
                <h2 id="movies-title">Filmes para você</h2>
            </div>
            <div class="filmes movie-row" id="filmes" aria-label="Lista de filmes para você"></div>
        </section>

        <section id="sec-series" class="catalog-section" aria-labelledby="series-title">
            <div class="section-heading">
                <h2 id="series-title">Em alta</h2>
            </div>
            <div class="filmes movie-row" id="series" aria-label="Lista de séries em alta"></div>
        </section>

        <!-- Seções dinâmicas por preferências do perfil (carregadas via TMDB) -->
        <div id="sec-personalizado"></div>

        <section id="minha-lista" class="catalog-section" aria-labelledby="list-title">
            <div class="section-heading">
                <h2 id="list-title">Minha Lista</h2>
            </div>
            <div class="filmes movie-row" id="lista" aria-label="Lista pessoal do usuário"></div>
        </section>
    </main>

    <!-- Modal para editar preferências do perfil -->
    <div class="edit-preferences-modal" id="edit-preferences-modal">
        <div class="modal-content">
            <h2>Editar Preferências</h2>
            <p class="modal-subtitle">Escolha os gêneros que você curte (opcional)</p>

            <div class="genres-grid" id="edit-genres-grid">
                <button class="genre-chip" type="button" data-genre="acao">Ação</button>
                <button class="genre-chip" type="button" data-genre="comedia">Comédia</button>
                <button class="genre-chip" type="button" data-genre="terror">Terror</button>
                <button class="genre-chip" type="button" data-genre="anime">Anime</button>
                <button class="genre-chip" type="button" data-genre="romance">Romance</button>
            </div>

            <div class="modal-buttons">
                <button class="modal-btn-cancel" id="pref-cancel-btn" type="button">Cancelar</button>
                <button class="modal-btn-confirm" id="pref-save-btn" type="button">Salvar Preferências</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/paginas/catalogo.js"></script>
</body>
</html>
