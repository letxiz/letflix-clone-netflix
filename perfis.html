<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>LETFLIX | Perfis</title>
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="css/perfis.css">
</head>
<body class="profiles-page">
	<a class="skip-link" href="#main-content">Pular para o conteudo principal</a>
	<div id="a11y-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>
	<header class="profiles-header">
		<div class="profiles-header-top">
			<a class="brand" href="perfis.html" aria-label="Voltar para seleção de perfis">
				<span class="logo-full">LETFLIX</span>
				<span class="logo-mobile">L</span>
			</a>
			<div class="profiles-actions">
				<button class="manage-button" id="open-add-profile-btn" type="button" aria-label="Adicionar perfil">
					Adicionar perfil
				</button>
			</div>
		</div>
	</header>

	<main id="main-content" class="profiles-main">
		<section class="profiles-section" aria-labelledby="profiles-title">
			<h1 id="profiles-title">Escolha um perfil</h1>
			<p class="profiles-helper-text" id="profiles-helper-text" hidden>Toque em um perfil para removê-lo.</p>

			<ul class="profiles-grid" id="profiles-grid">
				<!-- Perfis serão renderizados aqui via JS -->
			</ul>

			<div class="profiles-add-action" id="profiles-add-action"></div>

			<!-- Modal para adicionar novo perfil -->
			<div class="add-profile-modal" id="add-profile-modal" role="dialog" aria-modal="true" aria-labelledby="add-profile-title" aria-describedby="add-profile-subtitle" aria-hidden="true" tabindex="-1">
				<div class="modal-content">
					<h2 id="add-profile-title">Novo Perfil</h2>
					<p class="modal-subtitle" id="add-profile-subtitle">Crie um perfil escolhendo nome e avatar.</p>
					
					<div class="modal-form-group">
						<label for="profile-input">Nome do Perfil</label>
						<input 
							type="text" 
							id="profile-input" 
							placeholder="Digite o nome do perfil..."
							maxlength="30"
							autocomplete="off"
						>
					</div>

					<div class="modal-form-group">
						<label id="avatar-grid-label">Escolha um Avatar</label>
						<div class="avatar-grid" id="avatar-grid">
							<!-- Avatares serão renderizados aqui via JS -->
						</div>
					</div>

					<div class="modal-buttons">
						<button class="modal-btn-cancel" id="cancel-btn" type="button">Cancelar</button>
						<button class="modal-btn-confirm" id="confirm-btn" type="button" disabled>Criar</button>
					</div>
					<div class="modal-message" id="modal-message" role="alert"></div>
				</div>
			</div>
		</section>
	</main>

	<!-- Modal de preferências (etapa 2 após criar perfil) -->
	<div class="add-profile-modal" id="preferences-modal" role="dialog" aria-modal="true" aria-labelledby="preferences-title" aria-describedby="preferences-subtitle" aria-hidden="true" tabindex="-1">
		<div class="modal-content">
			<h2 id="preferences-title">Suas Preferências</h2>
			<p class="modal-subtitle" id="preferences-subtitle">Escolha os gêneros que você curte (opcional)</p>

			<div class="genres-grid" id="genres-grid">
				<button class="genre-chip" type="button" data-genre="acao" aria-pressed="false">Ação</button>
				<button class="genre-chip" type="button" data-genre="comedia" aria-pressed="false">Comédia</button>
				<button class="genre-chip" type="button" data-genre="terror" aria-pressed="false">Terror</button>
				<button class="genre-chip" type="button" data-genre="anime" aria-pressed="false">Anime</button>
				<button class="genre-chip" type="button" data-genre="romance" aria-pressed="false">Romance</button>
			</div>

			<div class="modal-buttons">
				<button class="modal-btn-cancel" id="pref-skip-btn" type="button">Pular</button>
				<button class="modal-btn-confirm" id="pref-confirm-btn" type="button">Salvar e Entrar</button>
			</div>
		</div>
	</div>

	<script type="module" src="js/paginas/perfis.js"></script>
</body>
</html>
