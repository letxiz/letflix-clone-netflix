<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>LETFLIX | Perfis</title>
	<link rel="stylesheet" href="style.css">
</head>
<body class="profiles-page">
	<header class="profiles-header">
		<a class="brand" href="index.html" aria-label="Voltar para seleção de perfis">LETFLIX</a>
	</header>

	<main class="profiles-main">
		<section class="profiles-section" aria-labelledby="profiles-title">
			<h1 id="profiles-title">Escolha um perfil</h1>

			<ul class="profiles-grid">
				<li class="profile-item">
					<a class="profile-link" href="catalogo.html" data-profile="Leticinha">
						<figure>
							<img src="assets/capa1.avif" alt="Perfil Leticinha" loading="lazy">
							<figcaption>Leticinha</figcaption>
						</figure>
					</a>
				</li>
				<li class="profile-item">
					<a class="profile-link" href="catalogo.html" data-profile="Pedro">
						<figure>
							<img src="assets/capa2.jpg" alt="Perfil Pedro" loading="lazy">
							<figcaption>Pedro</figcaption>
						</figure>
					</a>
				</li>
				<li class="profile-item">
					<a class="profile-link" href="catalogo.html" data-profile="Maria">
						<figure>
							<img src="assets/capa3.jpg" alt="Perfil Maria" loading="lazy">
							<figcaption>Maria</figcaption>
						</figure>
					</a>
				</li>
				<li class="profile-item">
					<a class="profile-link" href="catalogo.html" data-profile="Evellyn">
						<figure>
							<img src="assets/capa4.avif" alt="Perfil Evellyn" loading="lazy">
							<figcaption>Evellyn</figcaption>
						</figure>
					</a>
				</li>
			</ul>

			<button class="manage-button" type="button">Gerenciar perfis</button>
		</section>
	</main>

	<script src="script.js"></script>
</body>
</html>
