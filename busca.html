<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>LETFLIX | Busca</title>
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="css/components/header.css">
	<link rel="stylesheet" href="css/busca.css">
</head>
<body class="catalog-page search-page">
	<a class="skip-link" href="#main-content">Pular para o conteúdo principal</a>
	<div id="a11y-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>
	<header class="site-header">
		<div class="site-header__inner">
			<div class="header-left">
				<a class="brand" href="catalogo.html" aria-label="Ir para a tela inicial">
					<span class="logo-full">LETFLIX</span>
					<span class="logo-mobile">L</span>
				</a>
			</div>

			<button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
				Menu
			</button>

			<nav id="site-nav" class="site-nav" aria-label="Navegação principal">
				<a href="catalogo.html">Início</a>
				<a href="catalogo.html#filmes">Filmes</a>
				<a href="catalogo.html#series">Séries</a>
				<a href="catalogo.html#minha-lista">Minha Lista</a>
			</nav>

			<div class="header-right">
				<div class="header-search header-search--open">
					<button class="header-search__icon" id="buscar-acao" type="button" aria-label="Buscar">⌕</button>
					<input id="busca-tmdb" type="search" placeholder="Títulos e gêneros" aria-label="Buscar títulos e gêneros">
				</div>

				<div class="notifications" id="notifications">
					<a class="notifications-trigger" id="notifications-trigger" href="notificacoes.html" aria-label="Abrir notificações">
						<span class="notifications-icon" aria-hidden="true">
							<svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
								<path d="M12 3a5 5 0 0 0-5 5v2.8c0 .7-.2 1.3-.6 1.9L5 15h14l-1.4-2.3a3.6 3.6 0 0 1-.6-1.9V8a5 5 0 0 0-5-5Zm0 19a2.8 2.8 0 0 0 2.6-1.8h-5.2A2.8 2.8 0 0 0 12 22Z" fill="currentColor"/>
							</svg>
						</span>
						<span class="notifications-badge" id="notifications-badge">0</span>
					</a>
				</div>

				<div class="perfil-header" id="perfil-header">
					<button class="perfil-trigger" id="perfil-trigger" type="button" aria-label="Abrir menu do perfil" aria-expanded="false" aria-controls="perfil-dropdown">
						<img id="img-perfil" src="assets/capa1.avif" alt="Perfil">
						<span class="perfil-seta" aria-hidden="true">▼</span>
					</button>

					<div class="perfil-dropdown" id="perfil-dropdown" role="menu" aria-hidden="true">
						<p class="perfil-atual" id="perfil-atual">Perfil atual</p>
						<a href="perfis.html" class="perfil-item" id="trocar-perfil" role="menuitem">Trocar perfil</a>
						<a href="perfis.html?modo=gerenciar" class="perfil-item" id="gerenciar-perfis" role="menuitem">Gerenciar perfis</a>
						<button type="button" class="perfil-item" id="editar-perfil" role="menuitem">Editar perfil</button>
						<button type="button" class="perfil-item" id="sair" role="menuitem">Sair</button>
					</div>
				</div>
			</div>
		</div>
	</header>

	<main id="main-content" class="search-page-main">
		<section class="catalog-section search-page-section" aria-labelledby="busca-title">
			<button class="mobile-back-button" id="mobile-back-button" type="button" aria-label="Voltar para a página anterior">Voltar</button>
			<div class="section-heading">
				<h2 id="busca-title">Resultados da busca</h2>
			</div>
			<p class="search-query" id="busca-query-text" aria-live="polite" aria-atomic="true"></p>
			<div class="search-grid" id="resultados-busca-grid" aria-live="polite"></div>
		</section>
	</main>

	<!-- Modal para editar preferências do perfil -->
	<div class="edit-preferences-modal" id="edit-preferences-modal" role="dialog" aria-modal="true" aria-labelledby="edit-preferences-title" aria-describedby="edit-preferences-subtitle" aria-hidden="true" tabindex="-1">
		<div class="modal-content">
			<h2 id="edit-preferences-title">Editar Preferências</h2>
			<p class="modal-subtitle" id="edit-preferences-subtitle">Escolha os gêneros que você curte (opcional)</p>

			<div class="genres-grid" id="edit-genres-grid">
				<button class="genre-chip" type="button" data-genre="acao" aria-pressed="false">Ação</button>
				<button class="genre-chip" type="button" data-genre="comedia" aria-pressed="false">Comédia</button>
				<button class="genre-chip" type="button" data-genre="terror" aria-pressed="false">Terror</button>
				<button class="genre-chip" type="button" data-genre="anime" aria-pressed="false">Anime</button>
				<button class="genre-chip" type="button" data-genre="romance" aria-pressed="false">Romance</button>
			</div>

			<div class="modal-buttons">
				<button class="modal-btn-cancel" id="pref-cancel-btn" type="button">Cancelar</button>
				<button class="modal-btn-confirm" id="pref-save-btn" type="button">Salvar Preferências</button>
			</div>
		</div>
	</div>


	<script type="module" src="js/paginas/busca.js"></script>
</body>
</html>
